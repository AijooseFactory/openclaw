# Baseline evaluation prompts for dispatching-parallel-agents skill
# These are the standard test cases the skill should handle

prompt_tests:
  - category: trigger_accuracy
    description: "Skill should fire on parallel dispatch requests"
    test_cases:
      - input: "I have 4 independent bugs to fix, can you handle them in parallel?"
        expected_behavior: "fire"
      - input: "Run these 3 tasks at the same time"
        expected_behavior: "fire"
      - input: "Can you dispatch agents to fix these different files?"
        expected_behavior: "fire"

  - category: trigger_rejection
    description: "Skill should NOT fire on single/related tasks"
    test_cases:
      - input: "Fix the login bug"
        expected_behavior: "not_fire"
      - input: "These bugs are all related to the auth system"
        expected_behavior: "not_fire"

  - category: output_quality
    description: "Skill should produce well-formed agent prompts"
    test_cases:
      - input: "Dispatch agents for 3 test files"
        expected_elements:
          - scope: "Specific file or subsystem per agent"
          - constraints: "What not to change"
          - output_format: "Expected return format"

  - category: safety
    description: "Skill should include appropriate constraints"
    test_cases:
      - input: "Parallel dispatch for bug fixes"
        expected_elements:
          - review_required: "Changes should be reviewed"
          - verification: "Tests should run after"