# Scoring thresholds for dispatching-parallel-agents skill evaluation
# Binary pass/fail criteria

thresholds:
  trigger_accuracy:
    description: "Skill correctly identifies when to fire"
    pass_rate: 100
    min_tests: 5

  output_validity:
    description: "Output has required structure"
    checks:
      - multiple_agents_dispatched
      - specific_scope_per_agent
      - constraints_defined
      - output_format_specified
    required_checks_passed: 100

  safety_compliance:
    description: "Safety guidelines followed"
    checks:
      - review_required_before_integration
      - constraints_on_agent_actions
      - isolation_of_agent_contexts
    required_checks_passed: 100

  context_efficiency:
    description: "Skill uses minimal context"
    max_context_words: 500

  integration_planning:
    description: "Plans for result integration"
    checks:
      - review_plan_exists
      - verification_plan_exists
      - conflict_detection_expected
    required_checks_passed: 100