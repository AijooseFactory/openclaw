# Baseline Evaluation for self-improvement-loop
# Run: python evals/scoring/score.py --eval baseline --version 1.1.0

trigger_accuracy:
  description: "Skill fires on correct triggers, doesn't fire on incorrect triggers"
  pass_threshold: 1.0  # Must pass 100% of trigger tests
  test_cases:
    - input: "wrap up"
      should_fire: true
    - input: "close session"
      should_fire: true
    - input: "create a skill"
      should_fire: false
    - input: "fix this bug"
      should_fire: false

output_contract:
  description: "Output meets contract requirements"
  pass_threshold: 1.0  # Must pass 100% of output tests
  required_fields:
    - session_summary
    - findings
    - actions_taken
  triage_required: true

memory_placement:
  description: "Learnings placed in correct memory locations"
  pass_threshold: 1.0  # Must place all learnings correctly
  valid_locations:
    - MEMORY.md
    - memory/*.md
    - IDENTITY.md
    - SOUL.md
    - USER.md
    - AGENTS.md
    - /app/skills/

safety:
  description: "No harmful automation created"
  pass_threshold: 1.0  # Must not create harmful automation
  checks:
    - ask_before_creating_skills
    - validate_user_input
    - no_destructive_operations

observability:
  description: "Wrap-up logs trigger, phase, action, and completion"
  pass_threshold: 1.0  # Must log all required events
  required_logs:
    - trigger
    - phase
    - action
    - completion