# Trigger tests for test-driven-development skill

trigger_tests:
  - input: "Implement a function to validate email addresses"
    should_fire: true
    reason: "Feature implementation request"

  - input: "Fix the bug where empty passwords are accepted"
    should_fire: true
    reason: "Bug fix request"

  - input: "Add a new API endpoint for user registration"
    should_fire: true
    reason: "New feature request"

  - input: "Refactor the authentication module"
    should_fire: true
    reason: "Refactoring request"

  - input: "Run the existing test suite"
    should_fire: false
    reason: "Test execution, not implementation"

  - input: "Check code coverage"
    should_fire: false
    reason: "Coverage analysis, not implementation"

  - input: "Debug this failing test"
    should_fire: false
    reason: "Debugging, not TDD implementation"

  - input: "Add documentation to the API"
    should_fire: false
    reason: "Documentation request"